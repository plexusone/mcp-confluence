site_name: Confluence MCP Server
site_description: MCP server for Confluence with safe handling of Storage Format
site_url: https://plexusone.github.io/mcp-confluence
repo_url: https://github.com/plexusone/mcp-confluence
repo_name: plexusone/mcp-confluence

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Setup: getting-started/setup.md
      - Quick Start: getting-started/quickstart.md
  - Tools Reference:
      - Overview: tools/overview.md
  - Storage Format:
      - Overview: storage-format/overview.md
      - Block Types: storage-format/blocks.md
  - Configuration:
      - Credentials: configuration/credentials.md
      - Environment Variables: configuration/environment.md
      - Claude Desktop: configuration/claude-desktop.md
  - Releases:
      - v0.2.0: releases/v0.2.0.md
      - v0.1.0: releases/v0.1.0.md
  - Presentation: presentation.html

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/mcp-confluence
